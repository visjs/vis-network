<html>
  <head>
    <meta charset="utf-8" />
    <title>Vis Network | Physics | Wind Function</title>
  </head>
  <body>
    <form
      id="form"
      action="https://jsfiddle.net/api/post/library/pure/"
      method="post"
      target="_self"
    >
      <input
        type="hidden"
        name="css"
        value="#mynetwork {
  width: 600px;
  height: 400px;
  border: 1px solid lightgray;
}
"
      />
      <input
        type="hidden"
        name="html"
        value='<p>
  Node 1 is fixed, while a "wind" force pushes blue nodes to the right, and
  green nodes down.
</p>

<div id="mynetwork"></div>
'
      />
      <input
        type="hidden"
        name="js"
        value='const GREEN = "#9FE2BF";

// create an array with nodes
var nodes = new vis.DataSet([
  { id: 1, label: "Node 1", fixed: true },
  { id: 2, label: "Node 2", color: GREEN },
  { id: 3, label: "Node 3", color: GREEN },
  { id: 4, label: "Node 4" },
  { id: 5, label: "Node 5" },
]);

// create an array with edges
var edges = new vis.DataSet([
  { from: 1, to: 3 },
  { from: 1, to: 2 },
  { from: 2, to: 4 },
  { from: 2, to: 5 },
  { from: 3, to: 3 },
]);

// create a network
var container = document.getElementById("mynetwork");
var data = {
  nodes: nodes,
  edges: edges,
};

function wind(nodeId) {
  if (typeof nodeId === "string" &amp;&amp; nodeId.startsWith("edgeId:")) {
    // Bezier control point.  You can inspect the corresponding edge with
    // let edge = edges.get(nodeId.substring("edgeId:".length));

    return { x: -0.3, y: -0.3 };
  }

  var node = nodes.get(nodeId);

  return node &amp;&amp; node.color === GREEN ? { x: 0, y: 1.1 } : { x: 1, y: 0 };
}

var options = { physics: { enabled: true, wind } };
var network = new vis.Network(container, data, options);
'
      />
      <input
        type="hidden"
        name="resources"
        value="https://visjs.github.io/vis-network/standalone/umd/vis-network.min.js"
      />
      <input
        type="hidden"
        name="title"
        value="Vis Network | Physics | Wind Function"
      />
      <input type="hidden" name="wrap" value="b" />
      <button id="open" alt="JSFiddle" title="JSFiddle">Open JSFiddle</button>
    </form>

    <script type="text/javascript">
      document.getElementById("open").click();
    </script>
  </body>
</html>
